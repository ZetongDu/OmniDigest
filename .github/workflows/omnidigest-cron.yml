name: OmniDigest Daily Cron

on:
  schedule:
    # 每 10 分钟调用一次，由 /cron 根据用户配置决定是否发送
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  run-digests:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger OmniDigest cron
        run: |
          curl -X POST "${{ secrets.OMNIDIGEST_URL }}/cron" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_TOKEN }}" \
            -H "Content-Length: 0"